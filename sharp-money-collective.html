<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sharp Money Collective — Kalshi | Prediction Market Portfolio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            padding: 20px;
            min-height: 100vh;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px 0;
            border-bottom: 2px solid #0f3460;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle { color: #a0a0a0; font-size: 1rem; margin-top: 5px; }

        .loading {
            text-align: center;
            padding: 100px 20px;
            font-size: 1.2rem;
            color: #667eea;
        }

        .loading-spinner {
            display: inline-block;
            width: 50px; height: 50px;
            border: 4px solid rgba(102, 126, 234, 0.2);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 22px;
            backdrop-filter: blur(10px);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.25);
        }

        .stat-label {
            color: #a0a0a0;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .stat-value { font-size: 1.8rem; font-weight: 700; color: #fff; }
        .stat-change { font-size: 0.85rem; margin-top: 6px; color: #a0a0a0; }

        .positive { color: #4ade80; }
        .negative { color: #f87171; }

        .section {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
            backdrop-filter: blur(10px);
        }

        .section-title {
            font-size: 1.3rem;
            margin-bottom: 18px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Bet cards */
        .bet-card {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 18px;
            margin-bottom: 12px;
            transition: border-color 0.2s;
        }

        .bet-card:hover { border-color: rgba(102, 126, 234, 0.4); }
        .bet-card.winning { border-left: 3px solid #4ade80; }
        .bet-card.losing { border-left: 3px solid #f87171; }
        .bet-card.settled { border-left: 3px solid #666; opacity: 0.7; }

        .bet-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .bet-title { font-size: 1.05rem; font-weight: 600; color: #fff; flex: 1; }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-active { background: rgba(102, 126, 234, 0.2); color: #667eea; border: 1px solid rgba(102, 126, 234, 0.3); }
        .badge-won { background: rgba(74, 222, 128, 0.2); color: #4ade80; border: 1px solid rgba(74, 222, 128, 0.3); }
        .badge-lost { background: rgba(248, 113, 113, 0.2); color: #f87171; border: 1px solid rgba(248, 113, 113, 0.3); }
        .badge-sold { background: rgba(251, 191, 36, 0.2); color: #fbbf24; border: 1px solid rgba(251, 191, 36, 0.3); }

        .bet-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
            font-size: 0.85rem;
        }

        .bet-field-label { color: #a0a0a0; font-size: 0.75rem; margin-bottom: 3px; }
        .bet-field-value { color: #fff; font-weight: 600; }

        /* History table */
        .history-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        .history-table th {
            text-align: left;
            color: #a0a0a0;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 8px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .history-table td {
            padding: 10px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: #e0e0e0;
        }

        .history-table tr:hover td { background: rgba(255, 255, 255, 0.03); }

        .history-total td {
            font-weight: 700;
            border-top: 2px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            padding-top: 12px;
        }

        /* Chart */
        .chart-container { position: relative; height: 280px; width: 100%; }

        .chart-controls { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }

        .chart-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #a0a0a0;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .chart-btn:hover { background: rgba(102, 126, 234, 0.2); color: #fff; }
        .chart-btn.active { background: rgba(102, 126, 234, 0.3); border-color: #667eea; color: #fff; }

        footer {
            text-align: center;
            padding: 25px 0;
            color: #a0a0a0;
            font-size: 0.85rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 30px;
        }

        @media (max-width: 768px) {
            h1 { font-size: 1.8rem; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .bet-grid { grid-template-columns: 1fr 1fr; }
            .history-table { font-size: 0.8rem; }
            .history-table th, .history-table td { padding: 6px 8px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Sharp Money Collective</h1>
            <p class="subtitle">Kalshi Edition — Prediction Market Portfolio</p>
            <p class="subtitle" id="last-updated" style="margin-top: 5px; font-size: 0.85rem;">Loading...</p>
        </header>

        <div id="loading" class="loading">
            <div class="loading-spinner"></div>
            <div>Loading portfolio data...</div>
        </div>

        <div id="content" style="display: none;"></div>

        <footer>
            <div>Sharp Money Collective — Kalshi Edition</div>
            <div style="margin-top: 8px; font-size: 0.8rem;">
                Platform: Kalshi &bull; Started: Jan 25, 2026
            </div>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <script>
        let trendChart = null;

        async function loadPortfolio() {
            try {
                const response = await fetch('smc-data.json?' + Date.now());
                const data = await response.json();
                renderPortfolio(data);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
            } catch (error) {
                document.getElementById('loading').innerHTML =
                    `<div style="color: #f87171;">Error loading portfolio: ${error.message}</div>`;
            }
        }

        function renderPortfolio(data) {
            const { meta, portfolio, positions } = data;

            const lastUpdated = new Date(meta.lastUpdated).toLocaleString();
            document.getElementById('last-updated').textContent = `Last Updated: ${lastUpdated}`;

            // Use new structure (active/closed) with fallback to old (shortTerm/longTerm)
            const active = positions.active || [
                ...(positions.shortTerm || []),
                ...(positions.longTerm || []),
            ].filter(p => p.status === 'ACTIVE');
            const settled = positions.closed || [
                ...(positions.shortTerm || []),
                ...(positions.longTerm || []),
            ].filter(p => p.status !== 'ACTIVE');

            // Compute totals
            const perf = portfolio.performance;
            const wc = portfolio.workingCapital || {};
            const stats = portfolio.stats;

            const totalDeployed = active.reduce((s, p) => s + (p.amount || 0), 0);
            const totalSettledPnL = settled.reduce((s, p) => s + (p.profit || 0), 0);

            let html = '';

            // ── Top Cards ──
            html += `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">Portfolio Value</div>
                        <div class="stat-value">$${perf.currentValue.toFixed(2)}</div>
                        <div class="stat-change">${perf.totalCapitalIn ? '$' + perf.totalCapitalIn + ' capital in' : 'Started at $' + perf.startingBankroll}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Cash</div>
                        <div class="stat-value">$${(wc.available || 0).toFixed(2)}</div>
                        <div class="stat-change">$${totalDeployed.toFixed(2)} deployed</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Total Return</div>
                        <div class="stat-value ${perf.totalReturnPct >= 0 ? 'positive' : 'negative'}">${perf.totalReturnPct >= 0 ? '+' : ''}${perf.totalReturnPct}%</div>
                        <div class="stat-change">${perf.realizedProfit >= 0 ? '+' : ''}$${perf.realizedProfit.toFixed(2)} realized</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Win Rate</div>
                        <div class="stat-value">${stats.winRate}%</div>
                        <div class="stat-change">${stats.settledBets} settled, ${stats.activeBets} active</div>
                    </div>
                </div>
            `;

            // ── Trend Chart ──
            if (data.history && data.history.length > 1) {
                html += `
                    <div class="section">
                        <h2 class="section-title">Portfolio Trend</h2>
                        <div class="chart-controls">
                            <button class="chart-btn active" onclick="setChartRange('24h')">24H</button>
                            <button class="chart-btn" onclick="setChartRange('3d')">3D</button>
                            <button class="chart-btn" onclick="setChartRange('7d')">7D</button>
                            <button class="chart-btn" onclick="setChartRange('all')">All</button>
                        </div>
                        <div class="chart-container">
                            <canvas id="trendChart"></canvas>
                        </div>
                    </div>
                `;
            }

            // ── Active Bets ──
            if (active.length > 0) {
                html += `<div class="section"><h2 class="section-title">Active Bets (${active.length})</h2>`;
                for (const pos of active) {
                    const pnl = netPnL(pos);
                    const pct = netPct(pos);
                    const isWinning = pnl >= 0;
                    html += `
                        <div class="bet-card ${isWinning ? 'winning' : 'losing'}">
                            <div class="bet-header">
                                <div class="bet-title">${pos.title}</div>
                                <span class="badge badge-active">${pos.position}</span>
                            </div>
                            <div class="bet-grid">
                                <div><div class="bet-field-label">Cost</div><div class="bet-field-value">$${pos.amount.toFixed(2)}</div></div>
                                <div><div class="bet-field-label">Contracts</div><div class="bet-field-value">${pos.contracts}</div></div>
                                <div><div class="bet-field-label">Entry</div><div class="bet-field-value">${(pos.entryPrice * 100).toFixed(0)}c</div></div>
                                <div><div class="bet-field-label">Current</div><div class="bet-field-value">${pos.currentPrice ? (pos.currentPrice * 100).toFixed(0) + 'c' : '—'}</div></div>
                                <div><div class="bet-field-label">Net P&L</div><div class="bet-field-value ${isWinning ? 'positive' : 'negative'}">${pnl >= 0 ? '+' : ''}$${pnl.toFixed(2)} (${pct >= 0 ? '+' : ''}${pct.toFixed(0)}%)</div></div>
                                <div><div class="bet-field-label">Settles</div><div class="bet-field-value">${pos.settlementDate}</div></div>
                            </div>
                        </div>
                    `;
                }
                html += `</div>`;
            }

            // ── Bet History (all bets, combined value) ──
            // Net P&L: use profit field (from Kalshi API) for closed, unrealizedPnL for active
            function netPnL(pos) {
                if (pos.status === 'ACTIVE') return pos.unrealizedPnL || 0;
                return pos.profit || 0;
            }

            function netPct(pos) {
                const amt = pos.amount || 0;
                if (amt === 0) return 0;
                return (netPnL(pos) / amt) * 100;
            }

            html += `<div class="section"><h2 class="section-title">Bet History</h2>`;
            html += `<table class="history-table"><thead><tr>
                <th>Bet</th><th>Position</th><th>Invested</th><th>Net P&L</th><th>Return</th><th>Status</th>
            </tr></thead><tbody>`;

            let totalInvested = 0;
            let totalPnL = 0;

            // Sort all bets by net P&L descending (largest gains first)
            const sortedAll = [...active, ...settled].sort((a, b) => netPnL(b) - netPnL(a));

            for (const pos of sortedAll) {
                const pnl = netPnL(pos);
                const pct = netPct(pos);
                const pnlClass = pnl >= 0 ? 'positive' : 'negative';
                const statusBadge = pos.status === 'ACTIVE' ? 'badge-active'
                    : pos.status === 'WON' ? 'badge-won'
                    : pos.status === 'SOLD' ? 'badge-sold'
                    : 'badge-lost';

                totalInvested += pos.amount || 0;
                totalPnL += pnl;

                html += `<tr>
                    <td>${pos.title}</td>
                    <td>${pos.position}</td>
                    <td>$${(pos.amount || 0).toFixed(2)}</td>
                    <td class="${pnlClass}">${pnl >= 0 ? '+' : ''}$${pnl.toFixed(2)}</td>
                    <td class="${pnlClass}">${pct >= 0 ? '+' : ''}${pct.toFixed(0)}%</td>
                    <td><span class="badge ${statusBadge}">${pos.status}</span></td>
                </tr>`;
            }

            const totalPnLClass = totalPnL >= 0 ? 'positive' : 'negative';
            const totalPct = totalInvested > 0 ? (totalPnL / totalInvested * 100) : 0;
            html += `<tr class="history-total">
                <td colspan="2">Total</td>
                <td>$${totalInvested.toFixed(2)}</td>
                <td class="${totalPnLClass}">${totalPnL >= 0 ? '+' : ''}$${totalPnL.toFixed(2)}</td>
                <td class="${totalPnLClass}">${totalPct >= 0 ? '+' : ''}${totalPct.toFixed(0)}%</td>
                <td></td>
            </tr>`;

            html += `</tbody></table></div>`;

            document.getElementById('content').innerHTML = html;

            if (data.history && data.history.length > 1) {
                window._smcHistory = data.history;
                renderTrendChart(data.history, '24h');
            }
        }

        function filterHistory(history, range) {
            const now = new Date();
            const cutoffs = { '24h': 24*3600000, '3d': 3*24*3600000, '7d': 7*24*3600000, 'all': Infinity };
            const ms = cutoffs[range] || Infinity;
            if (ms === Infinity) return history;
            return history.filter(h => (now - new Date(h.ts)) <= ms);
        }

        function setChartRange(range) {
            document.querySelectorAll('.chart-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            if (window._smcHistory) renderTrendChart(window._smcHistory, range);
        }

        function renderTrendChart(history, range) {
            const filtered = filterHistory(history, range);
            if (filtered.length < 2) return;

            const labels = filtered.map(h => new Date(h.ts));
            const totalData = filtered.map(h => h.total);
            const cashData = filtered.map(h => h.cash);

            const canvas = document.getElementById('trendChart');
            if (!canvas) return;
            if (trendChart) trendChart.destroy();

            trendChart = new Chart(canvas.getContext('2d'), {
                type: 'line',
                data: {
                    labels,
                    datasets: [
                        {
                            label: 'Portfolio Value',
                            data: totalData,
                            borderColor: '#667eea',
                            backgroundColor: 'rgba(102, 126, 234, 0.1)',
                            fill: true, tension: 0.3,
                            pointRadius: 0, pointHitRadius: 10, borderWidth: 2,
                        },
                        {
                            label: 'Cash',
                            data: cashData,
                            borderColor: '#fbbf24',
                            backgroundColor: 'transparent',
                            tension: 0.3,
                            pointRadius: 0, pointHitRadius: 10, borderWidth: 1.5,
                            borderDash: [4, 4],
                        },
                    ],
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: { labels: { color: '#a0a0a0', usePointStyle: true, pointStyle: 'line', padding: 15 } },
                        tooltip: {
                            backgroundColor: 'rgba(22, 33, 62, 0.95)',
                            titleColor: '#fff', bodyColor: '#e0e0e0',
                            borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1,
                            callbacks: {
                                title: items => new Date(items[0].parsed.x).toLocaleString(),
                                label: item => ` ${item.dataset.label}: $${item.parsed.y.toFixed(2)}`,
                            }
                        },
                    },
                    scales: {
                        x: {
                            type: 'time',
                            time: { tooltipFormat: 'MMM d, h:mm a', displayFormats: { hour: 'h a', day: 'MMM d' } },
                            ticks: { color: '#666', maxTicksLimit: 8 },
                            grid: { color: 'rgba(255,255,255,0.05)' },
                        },
                        y: {
                            ticks: { color: '#666', callback: v => '$' + v.toFixed(0) },
                            grid: { color: 'rgba(255,255,255,0.05)' },
                        },
                    },
                },
            });
        }

        loadPortfolio();
        setInterval(loadPortfolio, 5 * 60 * 1000);
    </script>
</body>
</html>
